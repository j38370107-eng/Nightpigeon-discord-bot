<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NightPigeon — Server Management Dashboard</title>

    <!-- Primary meta -->
    <meta name="description" content="Configure and manage NightPigeon — advanced moderation, automod, logging, tickets, reaction roles, and more. Built for large servers." />

    <!-- Open Graph / Discord embed -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NightPigeon" />
    <meta property="og:title" content="NightPigeon — Server Management Dashboard" />
    <meta property="og:description" content="Advanced moderation, automod, anti-nuke, logging, tickets, reaction roles, and more. Built for large Discord servers." />
    <!-- og:image and og:url are injected server-side via DASHBOARD_URL -->

    <!-- Twitter card (also read by Discord for large image embeds) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NightPigeon — Server Management Dashboard" />
    <meta name="twitter:description" content="Advanced moderation, automod, anti-nuke, logging, tickets, reaction roles, and more. Built for large Discord servers." />

    <!-- Discord accent colour -->
    <meta name="theme-color" content="#1a1a2e" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
